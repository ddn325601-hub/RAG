<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能OnCall助手</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- 代码高亮库（可选） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">智能OnCall助手</h2>
            </div>
            
            <div class="sidebar-content">
                <button class="new-chat-btn nav-btn active" id="chatNavBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                    <span>智能问答</span>
                </button>
                
                <button class="sidebar-btn nav-btn" id="knowledgeBaseBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20V22H6.5A2.5 2.5 0 0 1 4 19.5V4.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                    <span>知识库管理</span>
                </button>

                <button class="sidebar-btn nav-btn" id="authDebugBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3L4 6V11C4 16.2 7.4 20.7 12 22C16.6 20.7 20 16.2 20 11V6L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M9.5 12.5L11.3 14.3L15 10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>接口调试</span>
                </button>

                <div class="chat-history-section">
                    <div class="history-header">
                        <span>近期对话</span>
                    </div>
                    <div class="chat-history-list" id="chatHistoryList">
                        <!-- 历史对话列表将在这里动态生成 -->
                    </div>
                </div>
                
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <button class="ai-ops-top-btn" id="aiOpsSidebarBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>AI Ops</span>
            </button>
            <div class="chat-container">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <p>你好！我是智能Oncall小助手</p>
                </div>
                <div class="chat-messages" id="chatMessages" data-testid="chat-scroll-container">
                </div>
                
                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <input type="text" id="messageInput" placeholder="问问智能OnCall助手" maxlength="1000" class="message-input">
                            <div class="input-bottom-bar">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="更多选项">
                                        <svg class="tools-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                                        </svg>
                                    </button>
                                    <div class="tools-menu" id="toolsMenu">
                                        <div class="tools-menu-item" id="uploadFileItem">
                                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                            <span>上传文件</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="right-actions">
                                    <div class="mode-selector-wrapper">
                                        <button class="mode-selector-btn" id="modeSelectorBtn">
                                            <span id="currentModeText">快速</span>
                                            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </button>
                                        <div class="mode-dropdown" id="modeDropdown">
                                            <div class="dropdown-header">选择对话方式</div>
                                            <div class="dropdown-item active" data-mode="quick">
                                                <div class="dropdown-item-main">
                                                    <span>快速</span>
                                                    <span class="badge-new">新</span>
                                                </div>
                                                <div class="dropdown-item-sub">快速对话</div>
                                            </div>
                                            <div class="dropdown-item" data-mode="stream">
                                                <div class="dropdown-item-main">
                                                    <span>流式</span>
                                                </div>
                                                <div class="dropdown-item-sub">流式对话</div>
                                            </div>
                                        </div>
                                    </div>
                                    <button class="send-btn-circle" id="sendButton" title="发送">
                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".txt,.md,.markdown" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <!-- 加载遮罩层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">智能运维分析中，请稍候...</div>
            <div class="loading-subtext">后端正在处理，请耐心等待</div>
        </div>
    </div>

    <div class="kb-drawer-overlay" id="kbDrawerOverlay"></div>
    <section class="kb-drawer" id="kbDrawer" aria-label="知识库管理">
        <div class="kb-drawer-header">
            <div>
                <h2>知识库管理</h2>
                <p>查看已投喂资料，上传 Markdown 或 TXT 文件后会自动写入向量库。</p>
            </div>
            <button class="kb-icon-btn" id="kbCloseBtn" title="关闭">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="kb-actions">
            <button class="kb-primary-btn" id="kbUploadBtn">上传资料</button>
            <button class="kb-secondary-btn" id="kbRefreshBtn">刷新列表</button>
        </div>
        <div class="kb-stats" id="kbStats">正在读取知识库...</div>
        <div class="kb-file-list" id="kbFileList"></div>
    </section>

    <div class="auth-drawer-overlay" id="authDrawerOverlay"></div>
    <section class="auth-drawer" id="authDrawer" aria-label="接口调试">
        <div class="auth-drawer-header">
            <div>
                <h2>接口调试</h2>
                <p>调用标准 /chat 接口，查看 Token 鉴权和响应结果。</p>
            </div>
            <button class="kb-icon-btn" id="authCloseBtn" title="关闭">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="auth-debug-content">
            <div class="auth-form-grid">
                <label>
                    <span>接口地址</span>
                    <input id="authEndpointInput" value="/chat" readonly>
                </label>
                <label>
                    <span>Token</span>
                    <input id="authTokenInput" type="password" placeholder="Bearer Token">
                </label>
            </div>
            <label class="auth-question-label">
                <span>请求问题</span>
                <textarea id="authQuestionInput" rows="3">支付订单超时如何排查？</textarea>
            </label>
            <div class="auth-actions">
                <button class="kb-secondary-btn" id="authRunWithoutTokenBtn">无 Token 请求</button>
                <button class="kb-primary-btn" id="authRunWithTokenBtn">带 Token 请求</button>
            </div>
            <div class="auth-result-grid">
                <section class="auth-result-card" id="authNoTokenCard">
                    <div class="auth-result-title">
                        <span>无 Token</span>
                        <strong id="authNoTokenStatus">待请求</strong>
                    </div>
                    <pre id="authNoTokenResponse">{}</pre>
                </section>
                <section class="auth-result-card" id="authWithTokenCard">
                    <div class="auth-result-title">
                        <span>带 Token</span>
                        <strong id="authWithTokenStatus">待请求</strong>
                    </div>
                    <pre id="authWithTokenResponse">{}</pre>
                </section>
            </div>
        </div>
    </section>

    <script src="app.js?v=20260618-product-demo"></script>
</body>
</html>
